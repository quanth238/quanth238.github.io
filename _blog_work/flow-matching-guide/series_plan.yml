parts:
  - part: 1
    status: "published"
    title: "Path, velocity target, loss, and first 2D check"
    reader_question: "What exactly does flow matching regress, and how does that become a sampler?"
    objective: "Establish x_t, u_t, MSE velocity regression, and ODE sampling."
    sources:
      - "https://arxiv.org/abs/2412.06264"
      - "https://arxiv.org/abs/2210.02747"
      - "https://arxiv.org/abs/2302.00482"
      - "https://arxiv.org/abs/2209.03003"
      - "https://arxiv.org/abs/2303.08797"
      - "https://github.com/facebookresearch/flow_matching"
      - "https://dl.heeere.com/conditional-flow-matching/blog/conditional-flow-matching/"
      - "https://www.weideng.org/posts/flow_matching/"
      - "https://daddaops.com/blog/flow-matching-from-scratch/"
    allowed_claims:
      - "Flow matching is simulation-free vector-field regression for continuous normalizing flows."
      - "Conditional paths give tractable target velocities."
      - "Sampling integrates the learned velocity field."
    code_target: "Complete: toy loss and path SVGs from run 20260519T105934Z."
    visual_intent: "Complete: approved overview SVG, pipeline Mermaid, and loss/path plots."
    transition: "Part 2 implements the sampling loop and compares solver step counts."

  - part: 2
    status: "draft-passing"
    title: "Sampling loop and solver steps"
    reader_question: "How do I turn a trained velocity field into samples, and what changes when I change ODE step count?"
    objective: "Make Euler or midpoint/RK sampling concrete before deeper theory."
    sources:
      - "https://arxiv.org/abs/2412.06264"
      - "https://arxiv.org/abs/2210.02747"
      - "https://github.com/facebookresearch/flow_matching"
      - "_blog_work/flow-matching-guide/remote_runs/20260519T105934Z/"
    allowed_claims:
      - "After training, generation follows an ODE under v_theta."
      - "Numerical solvers approximate the ODE integral."
      - "In the toy setting, fewer steps are faster but can expose field or path errors."
    claim_scope: "Keep solver-step conclusions toy-scoped; do not imply ImageNet-scale behavior."
    verification_evidence:
      - "_blog_work/flow-matching-guide/remote_runs/20260519T150932Z_fm04_official_api/api_verification.md"
      - "_blog_work/flow-matching-guide/remote_runs/20260519T151120Z_fm04_solver_steps/solver_step_metrics.json"
      - "assets/img/blog/flow-matching-guide/flow-matching-solver-steps.svg"
    outline:
      - "Trained field input"
      - "Euler sampler"
      - "Step-count sweep"
      - "Visual diagnostics"
      - "Limits of the toy field"
      - "Next step"
    code_target: "Complete: compared 4, 8, 16, and 32 Euler steps against a 128-step Euler reference on a fixed 2D toy field."
    visual_intent: "Complete: approved local SVG with trajectories by step count, final samples, toy-scope labels, and metric summary."
    transition: "Part 3 explains why conditional endpoint regression can learn the marginal field."

  - part: 3
    status: "planned"
    title: "Conditional to marginal velocity"
    reader_question: "Why is it valid to train on paired endpoints but sample without a target endpoint?"
    objective: "Give the conditional-expectation argument in inspectable form."
    sources:
      - "https://arxiv.org/abs/2210.02747"
      - "https://arxiv.org/abs/2302.00482"
      - "https://www.weideng.org/posts/flow_matching/"
      - "https://dl.heeere.com/conditional-flow-matching/blog/conditional-flow-matching/"
    allowed_claims:
      - "The ideal marginal velocity is intractable in general."
      - "Conditional flow matching uses cheap conditional velocities."
      - "The population optimum matches the marginal velocity under the standard CFM argument."
    needs_verification:
      - "Verify the exact theorem statement and notation from the Flow Matching Guide before drafting."
    outline:
      - "Ideal FM loss"
      - "Conditional path"
      - "Conditional velocity"
      - "Averaging intuition"
      - "Population objective"
      - "Sampling implication"
    code_target: "Create a grid/quiver toy showing many conditional arrows near (x,t) and their average direction."
    visual_intent: "Math-light Mermaid schematic plus local quiver plot; labels must distinguish conditional arrows from the learned marginal field."
    transition: "Part 4 changes the endpoint coupling and studies path quality."

  - part: 4
    status: "planned"
    title: "Couplings, minibatch OT, and rectified paths"
    reader_question: "How does endpoint pairing change path quality and sampling cost?"
    objective: "Compare independent pairing, minibatch OT pairing, and rectified-flow motivation."
    sources:
      - "https://arxiv.org/abs/2302.00482"
      - "https://arxiv.org/abs/2209.03003"
      - "https://arxiv.org/abs/2412.06264"
      - "https://dl.heeere.com/conditional-flow-matching/blog/conditional-flow-matching/"
    allowed_claims:
      - "Conditional flow matching permits different endpoint couplings."
      - "OT-CFM aims for simpler flows and faster inference in reported experiments."
      - "Rectified Flow studies straighter transports and coarse discretization."
    guardrails:
      - "Do not claim minibatch OT is globally optimal; state it as an approximation."
      - "Cite Visual Dive only as conceptual inspiration, not as a copied layout."
    outline:
      - "Coupling definition"
      - "Independent pairing pathology"
      - "Minibatch OT pairing"
      - "Rectified-flow view"
      - "Diagnostics"
    code_target: "Create a 2D endpoint pairing comparison with transport cost, line-crossing count, and sampled trajectories."
    visual_intent: "Side-by-side pairing lines and path plots."
    transition: "Part 5 asks what else can change besides coupling."

  - part: 5
    status: "planned"
    title: "Probability paths and diffusion connection"
    reader_question: "What changes when the path is not the simple straight interpolation?"
    objective: "Introduce path families without turning the post into a survey."
    sources:
      - "https://arxiv.org/abs/2412.06264"
      - "https://arxiv.org/abs/2210.02747"
      - "https://arxiv.org/abs/2303.08797"
      - "https://dl.heeere.com/conditional-flow-matching/blog/conditional-flow-matching/"
    allowed_claims:
      - "Path choice defines the probability path and associated velocity."
      - "Gaussian or diffusion-like paths connect flow and diffusion views."
      - "Stochastic interpolants unify deterministic and stochastic generative processes."
    needs_verification:
      - "Verify equations for conical Gaussian or diffusion path schedules from primary sources before drafting."
    outline:
      - "Why path choice matters"
      - "Linear path baseline"
      - "Gaussian or conical path"
      - "Diffusion and probability-flow connection"
      - "Practical selection rule"
    code_target: "Plot p_t snapshots and velocity magnitude for two path families on the same toy data."
    visual_intent: "Time-slice density/path SVGs; keep equations in Markdown, not inside images."
    transition: "Part 6 maps the concepts to the official package and scaling workflow."

  - part: 6
    status: "planned"
    title: "From toy code to the official flow_matching package"
    reader_question: "How do the loss, path, and solver concepts map onto real library components?"
    objective: "Bridge tutorial code to the official PyTorch package without overpromising production training."
    sources:
      - "https://arxiv.org/abs/2412.06264"
      - "https://github.com/facebookresearch/flow_matching"
    allowed_claims:
      - "The official repository provides continuous and discrete implementations, path, scheduler, loss, and solver modules, and synthetic, image, and text examples."
    needs_verification:
      - "Verify install and run feasibility in this worktree before any reader-facing package claim."
      - "If package install or a minimal official run fails, keep this part blocked."
    outline:
      - "Package anatomy"
      - "Minimal continuous example"
      - "Solver, loss, and path mapping"
      - "What to inspect before scaling"
      - "Optional discrete/text pointer"
    code_target: "Run a minimal official or official-inspired continuous synthetic example and store one verified output plot."
    visual_intent: "Component map Mermaid plus one verified output plot."
    transition: "End the series with a concise checklist, not a new unpublished part."

