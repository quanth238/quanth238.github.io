series: "flow-matching-guide"
created_at: "2026-05-19"
updated_at: "2026-05-19"
visual_contract:
  standard: "Plan the visual before drawing it; every reader-facing figure needs a brief, local asset or editable source, alt text, and evaluator decision."
  evidence: "Store source references, figure briefs, prompts, generated paths, code-result paths, and evaluator notes in this file."
  approval_rule: "A weak or generic figure is marked redesign and is not described as professional."
policy:
  external_images: "Do not copy, trace, or hotlink external diagrams."
  generated_images: "Create original figures from cited ideas; store prompt, asset path, and alt text."
  mermaid: "Use Mermaid for editable structural diagrams."

references:
  - source: "https://arxiv.org/abs/2412.06264"
    title: "Flow Matching Guide and Code"
    idea: "Use the paper as the authority for the velocity field, conditional path, loss, and ODE sampling; do not reuse any figure pixels."
    use: "primary-source"
  - source: "https://arxiv.org/abs/2210.02747"
    title: "Flow Matching for Generative Modeling"
    idea: "Use as the core source for simulation-free velocity regression and the conditional-to-marginal flow matching argument."
    use: "core-paper"
  - source: "https://arxiv.org/abs/2302.00482"
    title: "Improving and Generalizing Flow-Based Generative Models with Minibatch Optimal Transport"
    idea: "Use as the supporting source for conditional flow matching and the role of endpoint couplings."
    use: "core-paper"
  - source: "https://arxiv.org/abs/2209.03003"
    title: "Flow Straight and Fast: Learning to Generate and Transfer Data with Rectified Flow"
    idea: "Use as a related source when discussing straight transports, path quality, and sampling speed."
    use: "related-paper"
  - source: "https://arxiv.org/abs/2303.08797"
    title: "Stochastic Interpolants: A Unifying Framework for Flows and Diffusions"
    idea: "Use as a related source when connecting deterministic flow views to broader interpolating processes."
    use: "related-paper"
  - source: "https://dl.heeere.com/conditional-flow-matching/blog/conditional-flow-matching/"
    title: "A Visual Dive into Conditional Flow Matching"
    idea: "Cite the visual framing of a probability path and moving particles, then redraw the idea as an original source-path-velocity-solver figure."
    use: "visual-reference"
  - source: "https://www.weideng.org/posts/flow_matching/"
    title: "Flow Matching: A Minimal Guide"
    idea: "Cite the compact ODE and continuity-equation explanation to keep the math section concise."
    use: "technical-reference"
  - source: "https://daddaops.com/blog/flow-matching-from-scratch/"
    title: "Flow Matching from Scratch"
    idea: "Cite the beginner-oriented straight-line path and training-loop walkthrough for implementation structure."
    use: "implementation-reference"
  - source: "https://dl.heeere.com/conditional-flow-matching/blog/conditional-flow-matching/"
    idea: "Generated an original overview figure from the general visual idea of particles moving along a probability path, without copying any external diagram."
    use: "generated-figure-inspiration"
  - source: "https://github.com/facebookresearch/flow_matching"
    title: "facebookresearch/flow_matching"
    idea: "Use the official repository as a check on implementation vocabulary and to distinguish the toy demo from production examples."
    use: "implementation-reference"
figure_briefs:
  - id: "flow-matching-overview"
    kind: "svg-schematic"
    reader_question: "How do endpoint samples, interpolation times, velocity targets, a learned field, and ODE sampling fit together?"
    purpose: "Give a precise first visual map of the flow matching loop before equations."
    must_show:
      - "Source noise samples x0 on the left and target data samples x1 on the right."
      - "Straight interpolation path points at t=0, t=0.5, and t=1."
      - "Velocity target arrows u_t = x1 - x0 drawn along the conditional path."
      - "Learned vector field arrows v_theta(x,t) as local directions."
      - "One ODE sampling trajectory from fresh noise into the target cloud."
    avoid:
      - "Copied layout from external blogs."
      - "Dense labels, blurry text, logos, decorative style, or equations embedded inside the figure."
      - "A generic stock-art look that does not show the actual flow matching objects."
      - "Arrows that imply diffusion denoising steps rather than an ODE velocity field."
    cited_inspirations:
      - "https://arxiv.org/abs/2412.06264"
      - "https://dl.heeere.com/conditional-flow-matching/blog/conditional-flow-matching/"
      - "https://arxiv.org/abs/2210.02747"
    status: "approved"
  - id: "flow-matching-pipeline"
    kind: "mermaid"
    reader_question: "What is the sequence from sampled endpoints to training loss and sampler?"
    purpose: "Provide the editable source-of-truth diagram for the Part 1 algorithm."
    must_show:
      - "Endpoint samples, conditional path, velocity target, regression loss, learned field, and ODE sampling."
    avoid:
      - "Vague node names, label overlap, or missing accessibility title and description."
    cited_inspirations:
      - "https://arxiv.org/abs/2210.02747"
      - "https://arxiv.org/abs/2412.06264"
    status: "approved"
  - id: "flow-matching-code-result"
    kind: "data-plot"
    reader_question: "Does the minimal velocity-regression example produce an inspectable learning signal and paths?"
    purpose: "Show the toy run output with exact local figures instead of a prose-only claim."
    must_show:
      - "Loss curve over optimization steps."
      - "Source samples moving toward the target distribution."
    avoid:
      - "Unlabeled axes, over-smoothed curves, or claims that exceed the toy experiment."
    cited_inspirations:
      - "https://github.com/facebookresearch/flow_matching"
      - "https://daddaops.com/blog/flow-matching-from-scratch/"
    status: "approved"
generated_figures:
  - path: "assets/img/blog/flow-matching-guide/flow-matching-overview.svg"
    alt: "Flow matching schematic showing source and target samples, interpolation times, velocity target arrows, a learned vector field, and one ODE sampling trajectory."
    prompt: |
      Local SVG schematic specification: draw a deterministic, original technical overview for Flow Matching Part 1. Use a clean coordinate plane with source samples x0 from p0, target samples x1 from p1, straight conditional interpolation at t=0, t=0.5, and t=1, velocity target arrows along the highlighted path, learned vector-field arrows v_theta(x,t), and one ODE sampling trajectory from fresh noise into the target cloud. Use colorblind-aware blue, vermillion, teal, gray, and black marks; keep labels short; avoid copied layouts, dense text, decorative stock-art styling, logos, watermarks, and embedded derivations.
    source: "_blog_work/flow-matching-guide/make_overview_schematic.py"
    inspiration_sources:
      - "https://arxiv.org/abs/2412.06264"
      - "https://arxiv.org/abs/2210.02747"
      - "https://dl.heeere.com/conditional-flow-matching/blog/conditional-flow-matching/"
    status: "approved"
  - path: "assets/img/blog/flow-matching-guide/flow-matching-ai-overview.png"
    alt: "Flow matching overview showing source noise, paths, velocity arrows, a learned vector field, and generated samples."
    prompt: |
      Use case: scientific-educational. Asset type: original blog figure for a generative modeling tutorial. Create a clean original scientific explainer figure for flow matching. Show a left cloud of blue Gaussian noise points, a right cloud of red data points with two clusters, several smooth paths moving from left to right, small arrows along the paths indicating target velocity, and a subtle learned vector field in the middle. Include a final sampling trajectory from noise through an ODE solver path into the data cloud. Style should be crisp, professional, light background, vector-like, suitable for a machine learning tutorial. Avoid copying any existing diagram. Avoid dense text, avoid equations, avoid logos, avoid watermarks. Use only a few short labels if text is reliable: source noise, path, velocity, learned field, sample.
    inspiration_sources:
      - "https://arxiv.org/abs/2412.06264"
      - "https://dl.heeere.com/conditional-flow-matching/blog/conditional-flow-matching/"
    status: "replaced-by-local-svg"
