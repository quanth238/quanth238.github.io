      Local SVG schematic specification: draw a deterministic, original technical overview for Flow Matching Part 1. Use a clean coordinate plane with source samples x0 from p0, target samples x1 from p1, straight conditional interpolation at t=0, t=0.5, and t=1, velocity target arrows along the highlighted path, learned vector-field arrows v_theta(x,t), and one ODE sampling trajectory from fresh noise into the target cloud. Use colorblind-aware blue, vermillion, teal, gray, and black marks; keep labels short; avoid copied layouts, dense text, decorative stock-art styling, logos, watermarks, and embedded derivations.
    source: "_blog_work/flow-matching-guide/make_overview_schematic.py"
    inspiration_sources:
      - "https://arxiv.org/abs/2412.06264"
