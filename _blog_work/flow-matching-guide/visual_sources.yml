series: "flow-matching-guide"
created_at: "2026-05-19"
updated_at: "2026-05-19"
visual_contract:
  standard: "Plan the visual before drawing it; every reader-facing figure needs a brief, local asset or editable source, alt text, and evaluator decision."
  evidence: "Store source references, figure briefs, prompts, generated paths, code-result paths, and evaluator notes in this file."
  approval_rule: "A weak or generic figure is marked redesign and is not described as professional."
policy:
  external_images: "Do not copy, trace, or hotlink external diagrams."
  generated_images: "Create original figures from cited ideas; store prompt, asset path, and alt text."
  mermaid: "Use Mermaid for editable structural diagrams."

references:
  - source: "https://arxiv.org/abs/2412.06264"
    title: "Flow Matching Guide and Code"
    idea: "Use the paper as the authority for the velocity field, conditional path, loss, and ODE sampling; do not reuse any figure pixels."
    use: "primary-source"
  - source: "https://arxiv.org/abs/2210.02747"
    title: "Flow Matching for Generative Modeling"
    idea: "Use as the core source for simulation-free velocity regression and the conditional-to-marginal flow matching argument."
    use: "core-paper"
  - source: "https://arxiv.org/abs/2302.00482"
    title: "Improving and Generalizing Flow-Based Generative Models with Minibatch Optimal Transport"
    idea: "Use as the supporting source for conditional flow matching and the role of endpoint couplings."
    use: "core-paper"
  - source: "https://arxiv.org/abs/2209.03003"
    title: "Flow Straight and Fast: Learning to Generate and Transfer Data with Rectified Flow"
    idea: "Use as a related source when discussing straight transports, path quality, and sampling speed."
    use: "related-paper"
  - source: "https://arxiv.org/abs/2303.08797"
    title: "Stochastic Interpolants: A Unifying Framework for Flows and Diffusions"
    idea: "Use as a related source when connecting deterministic flow views to broader interpolating processes."
    use: "related-paper"
  - source: "https://dl.heeere.com/conditional-flow-matching/blog/conditional-flow-matching/"
    title: "A Visual Dive into Conditional Flow Matching"
    idea: "Cite the visual framing of a probability path and moving particles, then redraw the idea as an original source-path-velocity-solver figure."
    use: "visual-reference"
  - source: "https://www.weideng.org/posts/flow_matching/"
    title: "Flow Matching: A Minimal Guide"
    idea: "Cite the compact ODE and continuity-equation explanation to keep the math section concise."
    use: "technical-reference"
  - source: "https://daddaops.com/blog/flow-matching-from-scratch/"
    title: "Flow Matching from Scratch"
    idea: "Cite the beginner-oriented straight-line path and training-loop walkthrough for implementation structure."
    use: "implementation-reference"
  - source: "https://dl.heeere.com/conditional-flow-matching/blog/conditional-flow-matching/"
    idea: "Generated an original overview figure from the general visual idea of particles moving along a probability path, without copying any external diagram."
    use: "generated-figure-inspiration"
  - source: "https://github.com/facebookresearch/flow_matching"
    title: "facebookresearch/flow_matching"
    idea: "Use the official repository as a check on implementation vocabulary and to distinguish the toy demo from production examples."
    use: "implementation-reference"
figure_briefs:
  - id: "flow-matching-overview"
    kind: "svg-schematic"
    reader_question: "How do endpoint samples, interpolation times, velocity targets, a learned field, and ODE sampling fit together?"
    purpose: "Give a precise first visual map of the flow matching loop before equations."
    must_show:
      - "Source noise samples x0 on the left and target data samples x1 on the right."
      - "Straight interpolation path points at t=0, t=0.5, and t=1."
      - "Velocity target arrows u_t = x1 - x0 drawn along the conditional path."
      - "Learned vector field arrows v_theta(x,t) as local directions."
      - "One ODE sampling trajectory from fresh noise into the target cloud."
    avoid:
      - "Copied layout from external blogs."
      - "Dense labels, blurry text, logos, decorative style, or equations embedded inside the figure."
      - "A generic stock-art look that does not show the actual flow matching objects."
      - "Arrows that imply diffusion denoising steps rather than an ODE velocity field."
    cited_inspirations:
      - "https://arxiv.org/abs/2412.06264"
      - "https://dl.heeere.com/conditional-flow-matching/blog/conditional-flow-matching/"
      - "https://arxiv.org/abs/2210.02747"
    status: "approved"
  - id: "flow-matching-pipeline"
    kind: "mermaid"
    reader_question: "What is the sequence from sampled endpoints to training loss and sampler?"
    purpose: "Provide the editable source-of-truth diagram for the Part 1 algorithm."
    must_show:
      - "Endpoint samples, conditional path, velocity target, regression loss, learned field, and ODE sampling."
    avoid:
      - "Vague node names, label overlap, or missing accessibility title and description."
    cited_inspirations:
      - "https://arxiv.org/abs/2210.02747"
      - "https://arxiv.org/abs/2412.06264"
    status: "approved"
  - id: "flow-matching-code-result"
    kind: "data-plot"
    reader_question: "Does the minimal velocity-regression example produce an inspectable learning signal and paths?"
    purpose: "Show the toy run output with exact local figures instead of a prose-only claim."
    must_show:
      - "Loss curve over optimization steps."
      - "Source samples moving toward the target distribution."
    avoid:
      - "Unlabeled axes, over-smoothed curves, or claims that exceed the toy experiment."
    cited_inspirations:
      - "https://github.com/facebookresearch/flow_matching"
      - "https://daddaops.com/blog/flow-matching-from-scratch/"
    status: "approved"
  - id: "part-2-solver-step-sweep"
    kind: "data-plot"
    reader_question: "How do samples and trajectories change when the same trained toy field is integrated with different ODE step counts?"
    purpose: "Make the Part 2 sampler concrete by comparing a small set of solver-step budgets on the same 2D toy problem."
    must_show:
      - "Separate panels or clearly separated traces for 4, 8, 16, and 32 solver steps."
      - "Initial noise samples, ODE trajectories, and final generated samples for the same trained field."
      - "128-step reference endpoints and visible residuals from each coarse endpoint to its reference endpoint."
      - "A compact metric table or companion table keyed by step count."
      - "Short labels that identify the solver and toy scope."
    avoid:
      - "Claims or visual framing that imply large-scale image-generation conclusions."
      - "Unlabeled axes, inconsistent seeds across step counts, or hidden changes to the trained field."
      - "Dense text or equations inside the figure."
    cited_inspirations:
      - "https://arxiv.org/abs/2412.06264"
      - "https://arxiv.org/abs/2210.02747"
      - "https://github.com/facebookresearch/flow_matching"
    status: "approved"
  - id: "part-3-conditional-to-marginal-arrows"
    kind: "data-plot"
    reader_question: "Why can many conditional endpoint velocities near one location be summarized by a marginal direction?"
    purpose: "Show the conditional-to-marginal averaging idea with a visible query neighborhood and local arrows that remain visually distinct from the empirical field estimate."
    must_show:
      - "A marked query location and time, written as (x,t) in the caption or label."
      - "A global panel that shows which interpolated points are selected near the query."
      - "A zoom panel that makes the query neighborhood visible."
      - "Several conditional velocity arrows from endpoint pairs near that location."
      - "One empirical local average drawn with a different visual weight."
      - "A legend that distinguishes conditional arrows from the empirical local estimate and avoids implying an exact marginal oracle."
    avoid:
      - "Labels that imply the target endpoint is available at sampling time."
      - "Conflating a single conditional arrow with the learned marginal field."
      - "Using theorem notation before the exact statement has been verified."
    cited_inspirations:
      - "https://arxiv.org/abs/2210.02747"
      - "https://arxiv.org/abs/2302.00482"
      - "https://www.weideng.org/posts/flow_matching/"
      - "https://dl.heeere.com/conditional-flow-matching/blog/conditional-flow-matching/"
    status: "approved"
  - id: "part-3-cfm-argument-map"
    kind: "mermaid"
    reader_question: "What changes between the ideal marginal objective and the conditional flow matching objective?"
    purpose: "Give an editable, math-light map of the population-objective argument before the local quiver plot."
    must_show:
      - "Ideal marginal loss as the unavailable target."
      - "Conditional paths and conditional velocities as tractable training targets."
      - "Population averaging as the bridge to the marginal velocity."
      - "Sampling without a target endpoint as the final implication."
    avoid:
      - "Overloaded node labels or missing Mermaid accessibility metadata."
      - "Theorem wording that has not been checked against the primary source."
    cited_inspirations:
      - "https://arxiv.org/abs/2412.06264"
      - "https://arxiv.org/abs/2210.02747"
      - "https://arxiv.org/abs/2302.00482"
    status: "approved"
  - id: "part-4-coupling-comparison"
    kind: "data-plot"
    reader_question: "How does endpoint pairing change path geometry and simple toy diagnostics?"
    purpose: "Compare independent endpoint pairing, minibatch OT pairing, and rectified-flow motivation without overstating optimality."
    must_show:
      - "Side-by-side endpoint pairing lines for independent pairing and minibatch OT pairing."
      - "Comparable trajectory panels or path plots for each pairing setting."
      - "Toy transport cost and line-crossing count, with labels that state they are diagnostics."
      - "A clear note in metadata or caption that minibatch OT is an approximation, not a global OT proof."
    avoid:
      - "Copied layout from external visual blogs."
      - "Claims that minibatch OT is globally optimal."
      - "Decorative arrows that hide endpoint correspondences."
    cited_inspirations:
      - "https://arxiv.org/abs/2302.00482"
      - "https://arxiv.org/abs/2209.03003"
      - "https://arxiv.org/abs/2412.06264"
      - "https://dl.heeere.com/conditional-flow-matching/blog/conditional-flow-matching/"
    status: "approved"
  - id: "part-5-path-family-snapshots"
    kind: "data-plot"
    reader_question: "What visibly changes when the probability path is not the straight interpolation path?"
    purpose: "Show time-slice densities and velocity magnitudes for two verified path families on the same toy data."
    must_show:
      - "Matched time slices for the baseline linear path and one verified Gaussian or diffusion-like path."
      - "Comparable velocity-magnitude visualization for both path families."
      - "Consistent axes, color scale, and sampling seed across path families."
      - "A subtle same-axes cue so readers know the two rows are comparable on one coordinate scale."
      - "Captions or metadata that keep equations in Markdown rather than inside the image."
    avoid:
      - "Unverified conical Gaussian or diffusion schedule equations."
      - "One-off colors or density scales that make the comparison misleading."
      - "Equation text embedded inside a bitmap or dense plot labels."
    cited_inspirations:
      - "https://arxiv.org/abs/2412.06264"
      - "https://arxiv.org/abs/2210.02747"
      - "https://arxiv.org/abs/2303.08797"
      - "https://dl.heeere.com/conditional-flow-matching/blog/conditional-flow-matching/"
    status: "approved"
  - id: "part-6-package-component-map"
    kind: "mermaid"
    reader_question: "How do the toy loss, path, scheduler, and solver concepts map onto the official package components?"
    purpose: "Bridge the series notation to official-package concepts only after package names and APIs are verified."
    must_show:
      - "Toy concept nodes for path, scheduler, loss, velocity model, and solver."
      - "Official-package component names only after exact names are verified."
      - "A clear separation between continuous and optional discrete/text pointers."
    avoid:
      - "Guessing module names from memory."
      - "Overpromising production training coverage."
      - "Missing Mermaid accessibility metadata."
    cited_inspirations:
      - "https://arxiv.org/abs/2412.06264"
      - "https://github.com/facebookresearch/flow_matching"
    status: "approved"
  - id: "part-6-official-synthetic-output"
    kind: "data-plot"
    reader_question: "Can a minimal official continuous example make exact path and ODESolver agreement inspectable?"
    purpose: "Provide one verified output plot that shows package API wiring, exact path samples, solver trajectories, and scoped agreement metrics."
    must_show:
      - "The output of one install-verified minimal continuous synthetic run."
      - "A visible distinction between exact CondOTProbPath samples and ODESolver trajectories."
      - "A verified-output panel with solver-to-path gap at the same final time."
      - "A separate remaining-distance-to-endpoint metric that is not labeled as solver error."
      - "Run metadata path and local asset path in planning metadata."
      - "A caption that distinguishes official code from official-inspired local code."
    avoid:
      - "Reader-facing package claims before install and run feasibility are checked."
      - "Screenshots or plots without reproducible run metadata."
    cited_inspirations:
      - "https://github.com/facebookresearch/flow_matching"
      - "https://arxiv.org/abs/2412.06264"
    status: "approved"
