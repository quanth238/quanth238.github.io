quality_gate:
  required_before_publish: "Evaluator checks conceptual correctness, reader flow, label quality, originality, accessibility, and Jekyll rendering."
  evaluator_status: "passed"
  current_visual_risk: "The Part 1 overview has been redesigned as a local SVG schematic; keep using local SVGs, Mermaid, and data plots as the visual baseline for later parts."
evaluator_notes:
  - "Mermaid and code-result plots are the strongest visuals for Part 1 because they are editable and tied to exact objects."
  - "FM-02 replaced the draft AI bitmap with assets/img/blog/flow-matching-guide/flow-matching-overview.svg, generated by _blog_work/flow-matching-guide/make_overview_schematic.py."
  - "Evaluator decision: approved. The SVG shows source and target endpoint samples, straight interpolation times, velocity target arrows, learned vector-field arrows, and one ODE sampling trajectory without copied layout or decorative stock styling."
  - "Browser verification: 1280x720 and 390x844 renders loaded the SVG at natural size 1600x900, scaled responsively, and did not overflow the viewport. Evidence screenshots are stored in _blog_work/flow-matching-guide/evidence/."
  - "FM-03 evaluator decision: PASS_WITH_NOTES. Planned briefs for Parts 2-6 match the series plan and keep future visuals scoped to data plots or Mermaid diagrams with cited inspirations."
  - "Future visual gates: Part 2 needs generated step-count plots before drafting; Part 3 needs verified theorem notation; Part 5 needs verified path schedule equations; Part 6 needs package install/run evidence."
  - "FM-04 evaluator decision: approved. The solver-step SVG uses the same trained toy field and initial samples across 4, 8, 16, and 32 Euler steps; labels state the toy scope, metrics are registered in remote run metadata, and the figure has local alt text."
  - "FM-16 visual revision: user review correctly noted that the original 4/8/16/32 trajectory panels looked nearly identical at page scale. The regenerated solver-step SVG clips each panel, marks 128-step reference endpoints with purple rings, and adds orange residual segments from each coarse endpoint to its matching reference endpoint so the step-count drift is visible."
  - "FM-05 evaluator decision: approved. The Mermaid argument map has accessibility metadata, the conditional-to-marginal SVG distinguishes conditional arrows from the averaged local direction, theorem wording is source-verified, and all reader-facing assets are local."
  - "FM-17 visual revision: Part 3 conditional-to-marginal SVG was regenerated from scripts/blog_pipeline/examples/flow_matching_conditional_marginal.py as a two-panel global-selection plus zoom-neighborhood figure. Labels now call the teal direction an empirical local estimate rather than an exact marginal oracle."
  - "FM-06 evaluator decision: approved. The coupling diagnostic uses one displayed minibatch, labels minibatch OT as batch-local, reports toy transport cost and crossings, and avoids global OT claims."
  - "FM-07 evaluator decision: approved. The path-family SVG compares only source-verified Conditional OT and Linear VP schedules, keeps equations in Markdown, reports matched-time velocity magnitudes, and scopes the diffusion connection to Gaussian paths and probability-flow ODEs."
  - "FM-17 visual revision: Part 5 path-family SVG was regenerated from scripts/blog_pipeline/examples/flow_matching_path_families.py with a same-axes subtitle and repeated axis glyphs; the draft alt text and prose now state that rows share x-y axes."
  - "FM-08 evaluator decision: approved. The package bridge uses verified flow_matching==1.0.10 exports, records the CondOTProbPath naming difference, runs CondOTProbPath with ODESolver, and registers the local output SVG with alt text."
  - "FM-17 visual revision: Part 6 official-package bridge SVG was regenerated from scripts/blog_pipeline/examples/flow_matching_official_package_bridge.py with an API wiring strip, dashed exact paths drawn on top of solver paths, a verified-output metric panel, and magnified terminal residual inset."
